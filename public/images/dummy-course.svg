<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Dummy Course Image</title>
  <desc id="desc">Placeholder image for course preview</desc>
  <defs>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="1200" height="675" rx="36" fill="#f8fafc" />
  <rect x="80" y="80" width="1040" height="515" rx="28" fill="url(#grad)" filter="url(#shadow)" />
  <g fill="#ffffff" font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="260" font-size="64" font-weight="800">DUMMY IMAGE</text>
    <text x="600" y="340" font-size="36" opacity="0.85">Preview only — adjust later</text>
    <text x="600" y="430" font-size="28" opacity="0.75">Use this as a placeholder for course cards</text>
  </g>
</svg>
